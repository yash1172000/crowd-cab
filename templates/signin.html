{% extends 'base.html' %}
{% block content %}
<section class="auth-page">
  <form class="auth-card" method="post">
    <p class="eyebrow">Sign in</p><h1>Welcome back.</h1>
    <label>Email</label><input name="email" placeholder="customer@crowdcab.com">
    <label>Password</label><input name="password" type="password" placeholder="customer123">
    <button class="primary-btn" type="submit">Sign in</button>
    <div class="demo-logins"><b>Demo access</b><span>Customer: customer@crowdcab.com / customer123</span><span>Admin: admin@crowdcab.com / admin123</span><span>Developer: dev@crowdcab.com / dev123</span></div>
  </form>
</section>
{% endblock %}
